# Self-host Kerf — web + Blender worker.
#
#   1. cp .env.example .env   and set ANTHROPIC_API_KEY
#   2. docker compose up --build
#   3. open http://localhost:3000 — first boot lands on the setup wizard;
#      pick an admin password and you're in. Local mode has no marketing
#      landing — you go straight to the product.
#
# The blender-worker ships a real Blender binary, so the FIRST build is large
# (~1 GB, downloads Blender). It's what lets the agent actually edit geometry;
# without it the agent runs in mock mode and says it can't perform edits. To
# try just the UI, comment out the blender-worker service + its depends_on and
# drop BLENDER_WORKER_URL.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: kerf-web:local
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      # Forwarded from the host .env (docker compose auto-loads it).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      KERF_MODE: local
      KERF_DATA_DIR: /app/data
      KERF_ALLOW_SIGNUPS: ${KERF_ALLOW_SIGNUPS:-false}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      BLENDER_WORKER_URL: ${BLENDER_WORKER_URL:-http://blender-worker:8080}
    volumes:
      - kerf-data:/app/data
    depends_on:
      - blender-worker

  blender-worker:
    build:
      context: ./apps/blender-worker
    image: kerf-blender-worker:local
    restart: unless-stopped
    expose:
      - '8080'
    environment:
      WORKER_CORS_ORIGINS: '*'

volumes:
  kerf-data:
